name: Publish to PyPI

# Publishes the package to PyPI when a `vX.Y.Z` tag is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API token stored anywhere.
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   - PyPI project: agent-memory-hub
#   - Owner: jiyangnan
#   - Repository name: agent-memory-hub
#   - Workflow filename: publish.yml
#   - Environment name: pypi
#
# Once configured, every `git tag vX.Y.Z && git push --tags` triggers a release.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+'

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Validate metadata
        run: python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agent-memory-hub
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
