name: Build release distributions

# Builds wheel + sdist on every `vX.Y.Z` tag push and attaches them to the
# corresponding GitHub Release. The PyPI publish step is gated behind a
# repository variable (`vars.PYPI_PUBLISH_ENABLED == 'true'`) so it stays
# dormant until the PyPI name dispute resolves (see README install note).
#
# Enabling PyPI publishing later:
#   1. Configure PyPI Trusted Publishing for this repo (project / owner /
#      workflow filename `publish.yml` / environment `pypi`).
#   2. Settings → Environments → create environment `pypi`.
#   3. Settings → Variables → set `PYPI_PUBLISH_ENABLED = true`.
#   4. Re-push the tag (or push a new patch tag).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+'

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Validate metadata
        run: python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  attach-to-release:
    name: Attach wheel + sdist to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload to GitHub Release
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  publish-pypi:
    name: Publish to PyPI (gated)
    needs: build
    if: vars.PYPI_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agent-memory-hub
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
